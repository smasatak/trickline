services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trickline
      POSTGRES_PASSWORD: trickline
      POSTGRES_DB: trickline
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trickline"]
      interval: 5s
      timeout: 3s
      retries: 10

  # MinIO stands in for Cloudflare R2 locally (S3-compatible API).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot job: create the bucket and open read access for local playback.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do echo waiting for minio; sleep 1; done;
      mc mb -p local/trickline-videos;
      mc anonymous set download local/trickline-videos;
      echo 'bucket ready';
      exit 0;
      "

volumes:
  postgres-data:
  minio-data:
